name: Run Robot Tests in Parallel

on:
  schedule:
    - cron: '0 7 * * *'  # Executa todos os dias às 07:00 UTC
  workflow_dispatch:     # Permite rodar manualmente também

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v3

      - name: Configurar PYTHONPATH
        run: echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
           wget \
           unzip \
           xvfb \
           libglib2.0-0 \
           libnss3 \
           libfontconfig1 \
           libxss1 \
           libasound2t64

      - name: Instalar dependências Python
        run: pip install -r requirements.txt && pip install robotframework-pabot

      - name: Instalar Google Chrome (via apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Rodar testes Robot em paralelo
        id: run_tests
        run: |
          set -o pipefail
          # Inicia Xvfb em background
          Xvfb :99 -ac &
          XVFB_PID=$!
          export DISPLAY=:99
          # 1ª execução de todos os casos
          pabot --processes 4 --output output.xml TestCases || true
          # 2ª execução apenas dos que falharam
          pabot --processes 2 --rerunfailed output.xml --output rerun.xml TestCases || true
          # 3ª execução só dos que ainda falharam
           pabot --processes 1 --rerunfailed rerun1.xml --output rerun2.xml TestCases || true


          # Encerra o Xvfb
          kill $XVFB_PID

      - name: Mesclar outputs e gerar relatórios
        run: |
          set +e
          # Mescla resultados das tres execuções
          rebot --merge --output merged_output.xml output.xml rerun1.xml rerun2.xml
          # Gera HTML de log e report
          rebot --log log.html --report report.html merged_output.xml
          set -e
          
      - name: Verificar se ainda há falhas
        run: |
          FAIL_COUNT=$(grep -oP 'status="FAIL"' merged_output.xml | wc -l)
          echo "Total de falhas = $FAIL_COUNT"
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error ::Existem $FAIL_COUNT casos ainda falhando após retry!"
          exit 1
          fi

      - name: Listar arquivos gerados
        run: |
          echo "Listando arquivos na raiz:"
          ls -la
          echo "Se os arquivos estiverem em um diretório específico, liste-o também:"
          if [ -d "Results" ]; then
            ls -la Results
          else
            echo "Diretório 'Results' não existe, prosseguindo..."
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Robot Framework Reports
          path: |
            output.xml
            rerun1.xml
            rerun2.xml
            merged_output.xml
            log.html
            report.html
